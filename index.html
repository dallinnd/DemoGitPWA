<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple PWA Demo</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { display: flex; font-family: sans-serif; margin: 0; }
    /* Left Sidebar */
    nav { width: 200px; height: 100vh; background: #333; color: white; padding: 20px; position: fixed; }
    nav a { display: block; color: white; margin-bottom: 15px; text-decoration: none; }
    /* Main Content Area */
    main { margin-left: 240px; padding: 20px; flex-grow: 1; }
    img { max-width: 100%; height: auto; border-radius: 8px; }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <nav>
    <h2>Menu</h2>
    <a href="#photo">Photo Section</a>
    <a href="#video">Video Section</a>
  </nav>
  <main>
    <section id="photo">
      <h1>Hosted Photo</h1>
      <img src="https://picsum.photos" alt="Sample Image">
    </section>
    <section id="video">
      <h1>YouTube Video</h1>
      <div class="video-container">
        <!-- Replace YOUR_VIDEO_ID with a real YouTube ID -->
        <iframe src="https://youtu.be/zmWJxA3TMeo?si=FBcqLnUpDrLY-R9I" frameborder="0" allowfullscreen></iframe>
      </div>
    </section>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
